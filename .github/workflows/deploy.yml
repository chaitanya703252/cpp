name: Deploy LeaveFlow

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  DYNAMODB_TABLE: leaveflow-prod
  S3_BUCKET: leaveflow-files-prod-chaitanya
  FRONTEND_BUCKET: leaveflow-frontend-prod-chaitanya
  LAMBDA_FUNCTION: leaveflow-api
  IAM_ROLE: leaveflow-lambda-role
  SNS_TOPIC: leaveflow-notifications
  API_NAME: leaveflow-api

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install library dependencies
        run: |
          cd library
          pip install -e .
          pip install pytest

      - name: Run library tests
        run: |
          cd library
          python -m pytest tests/ -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  deploy-infrastructure:
    name: Deploy AWS Infrastructure
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name ${{ env.DYNAMODB_TABLE }} 2>/dev/null || \
          aws dynamodb create-table \
            --table-name ${{ env.DYNAMODB_TABLE }} \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --global-secondary-indexes \
              '[{
                "IndexName": "GSI-Email",
                "KeySchema": [
                  {"AttributeName": "GSI1PK", "KeyType": "HASH"},
                  {"AttributeName": "GSI1SK", "KeyType": "RANGE"}
                ],
                "Projection": {"ProjectionType": "ALL"},
                "ProvisionedThroughput": {"ReadCapacityUnits": 5, "WriteCapacityUnits": 5}
              }]' \
            --provisioned-throughput ReadCapacityUnits=5,WriteCapacityUnits=5

      - name: Create S3 bucket for files
        run: |
          aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

      - name: Create SNS topic
        run: |
          aws sns create-topic --name ${{ env.SNS_TOPIC }} --region ${{ env.AWS_REGION }}

      - name: Create IAM role for Lambda
        run: |
          aws iam get-role --role-name ${{ env.IAM_ROLE }} 2>/dev/null || \
          aws iam create-role \
            --role-name ${{ env.IAM_ROLE }} \
            --assume-role-policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Service": "lambda.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }]
            }'

          aws iam attach-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

          aws iam put-role-policy \
            --role-name ${{ env.IAM_ROLE }} \
            --policy-name leaveflow-permissions \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": ["dynamodb:*"],
                  "Resource": "arn:aws:dynamodb:${{ env.AWS_REGION }}:*:table/${{ env.DYNAMODB_TABLE }}*"
                },
                {
                  "Effect": "Allow",
                  "Action": ["s3:*"],
                  "Resource": ["arn:aws:s3:::${{ env.S3_BUCKET }}", "arn:aws:s3:::${{ env.S3_BUCKET }}/*"]
                },
                {
                  "Effect": "Allow",
                  "Action": ["sns:*"],
                  "Resource": "arn:aws:sns:${{ env.AWS_REGION }}:*:${{ env.SNS_TOPIC }}"
                }
              ]
            }'

  deploy-backend:
    name: Deploy Lambda Backend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambda function
        run: |
          cd backend
          pip install -r requirements.txt -t package/
          cp lambda_function.py package/
          cd package
          zip -r ../lambda.zip .

      - name: Get SNS topic ARN
        id: sns
        run: |
          ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn, '${{ env.SNS_TOPIC }}')].TopicArn" --output text)
          echo "topic_arn=$ARN" >> $GITHUB_OUTPUT

      - name: Get IAM role ARN
        id: role
        run: |
          ARN=$(aws iam get-role --role-name ${{ env.IAM_ROLE }} --query 'Role.Arn' --output text)
          echo "role_arn=$ARN" >> $GITHUB_OUTPUT

      - name: Deploy Lambda function
        run: |
          aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION }} 2>/dev/null && \
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --zip-file fileb://backend/lambda.zip || \
          aws lambda create-function \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --runtime python3.12 \
            --handler lambda_function.lambda_handler \
            --role ${{ steps.role.outputs.role_arn }} \
            --zip-file fileb://backend/lambda.zip \
            --timeout 30 \
            --memory-size 256 \
            --environment "Variables={
              DYNAMODB_TABLE=${{ env.DYNAMODB_TABLE }},
              S3_BUCKET=${{ env.S3_BUCKET }},
              SNS_TOPIC_ARN=${{ steps.sns.outputs.topic_arn }},
              REGION=${{ env.AWS_REGION }},
              JWT_SECRET=${{ secrets.JWT_SECRET }}
            }"

      - name: Update Lambda environment
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --environment "Variables={
              DYNAMODB_TABLE=${{ env.DYNAMODB_TABLE }},
              S3_BUCKET=${{ env.S3_BUCKET }},
              SNS_TOPIC_ARN=${{ steps.sns.outputs.topic_arn }},
              REGION=${{ env.AWS_REGION }},
              JWT_SECRET=${{ secrets.JWT_SECRET }}
            }"

      - name: Create/Update API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='${{ env.API_NAME }}'].id" --output text)

          if [ -z "$API_ID" ]; then
            API_ID=$(aws apigateway create-rest-api \
              --name ${{ env.API_NAME }} \
              --endpoint-configuration types=REGIONAL \
              --query 'id' --output text)
          fi

          PARENT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text)

          RESOURCE_ID=$(aws apigateway create-resource \
            --rest-api-id $API_ID \
            --parent-id $PARENT_ID \
            --path-part "{proxy+}" \
            --query 'id' --output text 2>/dev/null || \
          aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/{proxy+}'].id" --output text)

          for METHOD in GET POST PUT DELETE OPTIONS; do
            aws apigateway put-method \
              --rest-api-id $API_ID \
              --resource-id $RESOURCE_ID \
              --http-method $METHOD \
              --authorization-type NONE 2>/dev/null || true

            aws apigateway put-integration \
              --rest-api-id $API_ID \
              --resource-id $RESOURCE_ID \
              --http-method $METHOD \
              --type AWS_PROXY \
              --integration-http-method POST \
              --uri "arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/arn:aws:lambda:${{ env.AWS_REGION }}:$(aws sts get-caller-identity --query Account --output text):function:${{ env.LAMBDA_FUNCTION }}/invocations" 2>/dev/null || true
          done

          aws apigateway create-deployment \
            --rest-api-id $API_ID \
            --stage-name prod

          aws lambda add-permission \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --statement-id apigateway-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${{ env.AWS_REGION }}:$(aws sts get-caller-identity --query Account --output text):$API_ID/*" 2>/dev/null || true

          echo "API URL: https://$API_ID.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create frontend S3 bucket
        run: |
          aws s3api head-bucket --bucket ${{ env.FRONTEND_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket \
            --bucket ${{ env.FRONTEND_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}

          aws s3 website s3://${{ env.FRONTEND_BUCKET }} \
            --index-document index.html \
            --error-document index.html

          aws s3api put-public-access-block \
            --bucket ${{ env.FRONTEND_BUCKET }} \
            --public-access-block-configuration \
              BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          aws s3api put-bucket-policy \
            --bucket ${{ env.FRONTEND_BUCKET }} \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [{
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::${{ env.FRONTEND_BUCKET }}/*"
              }]
            }'

      - name: Get API URL
        id: api
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='${{ env.API_NAME }}'].id" --output text)
          echo "url=https://$API_ID.execute-api.${{ env.AWS_REGION }}.amazonaws.com/prod" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          VITE_API_URL=${{ steps.api.outputs.url }} npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.FRONTEND_BUCKET }}/ --delete

          echo "Frontend URL: http://${{ env.FRONTEND_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
