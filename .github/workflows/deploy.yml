name: Deploy StudySync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test library
        run: cd library && pip install -e . && pip install pytest && pytest tests/ -v

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-library
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB table
        run: |
          EXISTING_KEY=$(aws dynamodb describe-table --table-name studysync-prod --query 'Table.KeySchema[0].AttributeName' --output text 2>/dev/null || echo "none")
          if [ "$EXISTING_KEY" = "PK" ]; then
            echo "Table has wrong key schema, deleting..."
            aws dynamodb delete-table --table-name studysync-prod
            aws dynamodb wait table-not-exists --table-name studysync-prod
          fi
          if ! aws dynamodb describe-table --table-name studysync-prod 2>/dev/null; then
            aws dynamodb create-table \
              --table-name studysync-prod \
              --attribute-definitions AttributeName=id,AttributeType=S \
              --key-schema AttributeName=id,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region eu-west-1
            aws dynamodb wait table-exists --table-name studysync-prod
          fi

      - name: Create S3 bucket
        run: |
          aws s3api head-bucket --bucket studysync-files-prod-chaitanya 2>/dev/null || \
          aws s3api create-bucket --bucket studysync-files-prod-chaitanya --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1
          aws s3api put-bucket-cors --bucket studysync-files-prod-chaitanya --region eu-west-1 --cors-configuration '{
            "CORSRules": [{"AllowedHeaders": ["*"], "AllowedMethods": ["GET", "PUT", "POST"], "AllowedOrigins": ["*"], "ExposeHeaders": []}]
          }'

      - name: Create IAM role and attach policies
        run: |
          if ! aws iam get-role --role-name studysync-lambda-role 2>/dev/null; then
            aws iam create-role --role-name studysync-lambda-role \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          fi
          aws iam attach-role-policy --role-name studysync-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess || true
          aws iam attach-role-policy --role-name studysync-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess || true
          aws iam attach-role-policy --role-name studysync-lambda-role --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess || true
          aws iam attach-role-policy --role-name studysync-lambda-role --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole || true

      - name: Create SNS topic
        run: |
          SNS_TOPIC_ARN=$(aws sns create-topic --name studysync-notifications --region eu-west-1 --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_TOPIC_ARN" >> $GITHUB_ENV

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda
        run: cd backend && zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda
        run: |
          ROLE_ARN=$(aws iam get-role --role-name studysync-lambda-role --query 'Role.Arn' --output text)
          if aws lambda get-function --function-name studysync-api --region eu-west-1 > /dev/null 2>&1; then
            aws lambda update-function-code --function-name studysync-api --zip-file fileb://lambda.zip --region eu-west-1
            aws lambda wait function-updated --function-name studysync-api --region eu-west-1
            aws lambda update-function-configuration --function-name studysync-api \
              --runtime python3.11 --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=studysync-prod,S3_BUCKET=studysync-files-prod-chaitanya,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=studysync-secret-2026}" \
              --region eu-west-1
          else
            aws lambda create-function --function-name studysync-api \
              --runtime python3.11 --role "$ROLE_ARN" --handler lambda_function.lambda_handler \
              --zip-file fileb://lambda.zip --memory-size 256 --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=studysync-prod,S3_BUCKET=studysync-files-prod-chaitanya,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},REGION=eu-west-1,JWT_SECRET=studysync-secret-2026}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='studysync-api'].id" --output text --region eu-west-1)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name studysync-api --endpoint-configuration types=REGIONAL --query 'id' --output text --region eu-west-1)
          fi

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region eu-west-1)
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region eu-west-1)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region eu-west-1)
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name studysync-api --query 'Configuration.FunctionArn' --output text --region eu-west-1)
          LAMBDA_URI="arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region eu-west-1
          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region eu-west-1 2>/dev/null || true
          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "$LAMBDA_URI" --region eu-west-1

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name studysync-api --statement-id apigw-invoke-$(date +%s) --action lambda:InvokeFunction --principal apigateway.amazonaws.com --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" --region eu-west-1 2>/dev/null || true

          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1
          echo "API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get API URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='studysync-api'].id" --output text --region eu-west-1)
          echo "VITE_API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Build frontend
        run: |
          cd frontend
          rm -rf node_modules package-lock.json
          npm install --force
          VITE_API_URL=${{ env.VITE_API_URL }} npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3api head-bucket --bucket studysync-frontend-prod-chaitanya 2>/dev/null || \
          aws s3api create-bucket --bucket studysync-frontend-prod-chaitanya --region eu-west-1 --create-bucket-configuration LocationConstraint=eu-west-1

          aws s3 website s3://studysync-frontend-prod-chaitanya --index-document index.html --error-document index.html
          aws s3api put-public-access-block --bucket studysync-frontend-prod-chaitanya \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" --region eu-west-1
          aws s3api put-bucket-policy --bucket studysync-frontend-prod-chaitanya --region eu-west-1 --policy '{
            "Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":"s3:GetObject","Resource":"arn:aws:s3:::studysync-frontend-prod-chaitanya/*"}]
          }'
          aws s3 sync frontend/dist/ s3://studysync-frontend-prod-chaitanya --delete --region eu-west-1
          echo "Frontend URL: http://studysync-frontend-prod-chaitanya.s3-website-eu-west-1.amazonaws.com"
